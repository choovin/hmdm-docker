# PostgreSQL configuration for standby node
# Streaming replication settings

listen_addresses = '*'
port = 5432
max_connections = 100

# Replication settings (standby)
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 1GB
hot_standby = on

# Primary connection for replication
primary_conninfo = 'host=postgresql-primary port=5432 user=replicator password=replicator123 application_name=standby2'
primary_slot_name = 'standby2_slot'

# Logging
log_destination = 'stderr'
logging_collector = off
log_connections = on
log_disconnections = on
log_statement = 'all'

# Performance
shared_buffers = 256MB
effective_cache_size = 1GB
maintenance_work_mem = 128MB
checkpoint_completion_target = 0.9
wal_buffers = 16MB
default_statistics_target = 100
random_page_cost = 1.1
effective_io_concurrency = 200
work_mem = 4MB
min_wal_size = 1GB
max_wal_size = 4GB

# Replication debugging
log_line_prefix = '%m [%p] %q%u@%d '
