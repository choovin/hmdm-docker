# Pgpool-II configuration for connection pooling and load balancing

# Connection settings
listen_addresses = '*'
port = 5432
socket_dir = '/var/run/pgpool'

# Backend connection (these will be auto-detected but can be set explicitly)
backend_hostname0 = 'postgresql-primary'
backend_port0 = 5432
backend_weight0 = 1
backend_data_directory0 = '/var/lib/postgresql/data'
backend_flag0 = 'ALLOW_TO_FAILOVER'

backend_hostname1 = 'postgresql-standby1'
backend_port1 = 5432
backend_weight1 = 1
backend_data_directory1 = '/var/lib/postgresql/data'
backend_flag1 = 'ALLOW_TO_FAILOVER'

backend_hostname2 = 'postgresql-standby2'
backend_port2 = 5432
backend_weight2 = 1
backend_data_directory2 = '/var/lib/postgresql/data'
backend_flag2 = 'ALLOW_TO_FAILOVER'

# Authentication
pool_passwd = 'pool_passwd'
pool_authuser = 'pgpool'
enable_pool_hba = on

# Connection pool
num_init_children = 32
max_pool = 4
child_life_time = 300
child_max_connections = 0
connection_life_time = 600
client_idle_limit = 0

# Load balancing
load_balance_mode = on
master_slave_mode = on
master_slave_sub_mode = 'stream'

# Streaming replication check
sr_check_period = 10
sr_check_user = '${SQL_USER}'
sr_check_password = '${SQL_PASS}'
sr_check_database = '${SQL_BASE}'

# Health check
health_check_period = 10
health_check_timeout = 20
health_check_user = '${SQL_USER}'
health_check_password = '${SQL_PASS}'
health_check_database = '${SQL_BASE}'
health_check_max_retries = 3
health_check_retry_delay = 1

# Failover
failover_command = '/etc/pgpool/failover.sh %h %p %d %m'
fail_over_on_backend_error = on

# Logging
log_directory = '/var/log/pgpool'
log_filename = 'pgpool.log'
log_connections = on
log_disconnections = on
log_statement = on

# Statistics
enable_pool_stats = on
pool_stats_temp_directory = '/var/log/pgpool'

# Watchdog (for HA)
use_watchdog = on
trusted_servers = ''
ping_path = '/bin'

# Other
pcp_listen_addresses = '*'
pcp_port = 9898
