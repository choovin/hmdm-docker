# Pgpool-II configuration for connection pooling and load balancing

# Connection settings
listen_addresses = '*'
port = 5432
socket_dir = '/var/run/postgresql'
pid_file = '/var/run/postgresql/pgpool.pid'

# Backend connection
backend_hostname0 = 'postgresql-primary'
backend_port0 = 5432
backend_weight0 = 1
backend_flag0 = 'ALLOW_TO_FAILOVER'
discover_backend_nodes = on

# Standby nodes disabled - not configured for streaming replication
# backend_hostname1 = 'postgresql-standby1'
# backend_port1 = 5432
# backend_weight1 = 1
# backend_data_directory1 = '/var/lib/postgresql/data'
# backend_flag1 = 'ALLOW_TO_FAILOVER'

# backend_hostname2 = 'postgresql-standby2'
# backend_port2 = 5432
# backend_weight2 = 1
# backend_data_directory2 = '/var/lib/postgresql/data'
# backend_flag2 = 'ALLOW_TO_FAILOVER'

# Authentication
enable_pool_hba = on
pool_passwd = '/etc/pool_passwd'

# Connection pool
num_init_children = 32
max_pool = 4
child_life_time = 300
child_max_connections = 0
connection_life_time = 600
client_idle_limit = 0

# Load balancing
load_balance_mode = on
# master_slave_mode = on
# master_slave_sub_mode = 'stream'

# Streaming replication check
sr_check_period = 10
sr_check_user = 'hmdm'
sr_check_password = 'hmdm123'
sr_check_database = 'hmdm'

# Health check
health_check_period = 10
health_check_timeout = 20
health_check_user = 'hmdm'
health_check_password = 'hmdm123'
health_check_database = 'hmdm'
health_check_max_retries = 3
health_check_retry_delay = 1

# Failover
# failover_on_backend_error = on

# Logging
log_directory = '/var/log/pgpool'
log_filename = 'pgpool.log'
log_connections = on
log_disconnections = on
log_statement = off

# Other
pcp_listen_addresses = '*'
pcp_port = 9898
