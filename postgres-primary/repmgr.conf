# repmgr configuration for PostgreSQL Primary Node

# Node identification
node_id=1
node_name='postgresql-primary'
conninfo='host=postgresql-primary user=repmgr dbname=repmgr connect_timeout=2'

# Data directory
data_directory='/var/lib/postgresql/data'

# PostgreSQL configuration
postgres_conf='/etc/postgresql/postgresql.conf'

# repmgr database
repmgrd_service_start_command = 'pg_ctl start -D /var/lib/postgresql/data -l /var/log/postgresql/repmgr.log -o "-c config_file=/etc/postgresql/postgresql.conf"'
repmgrd_service_stop_command = 'pg_ctl stop -D /var/lib/postgresql/data -m fast'

# Failover settings
failover='automatic'
promote_command='repmgr standby promote -f /etc/repmgr.conf --log-to-file'
follow_command='repmgr standby follow -f /etc/repmgr.conf --log-to-file'

# Logging
log_level='INFO'
log_file='/var/log/postgresql/repmgr.log'

# Connection check
connection_check_type='connection'
check_interval=10
check_timeout=5

# Reconnection
reconnect_interval=10
reconnect_attempts=6
