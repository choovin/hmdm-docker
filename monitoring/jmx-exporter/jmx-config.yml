---
# JMX Exporter configuration for Headwind MDM
# This configuration exposes JVM metrics for Prometheus

lowercaseOutputName: true
lowercaseOutputLabelNames: true

rules:
  # JVM Memory
  - pattern: 'java.lang<type=Memory><HeapMemoryUsage>(\w+)'
    name: jvm_memory_$1_bytes
    type: GAUGE
    help: "JVM heap memory usage"
  - pattern: 'java.lang<type=Memory><NonHeapMemoryUsage>(\w+)'
    name: jvm_memory_$1_bytes
    type: GAUGE
    help: "JVM non-heap memory usage"
  - pattern: 'java.lang<type=Memory><(\w+)>(\w+)'
    name: jvm_memory_$1_$2
    type: GAUGE
    help: "JVM memory metrics"

  # JVM Threads
  - pattern: 'java.lang<type=Threading><>(\w+)'
    name: jvm_threads_$1
    type: GAUGE
    help: "JVM thread metrics"

  # JVM GC
  - pattern: 'java.lang<type=GarbageCollector, name=(\w+)><>(\w+)'
    name: jvm_gc_$2
    type: GAUGE
    help: "JVM garbage collection metrics"
    labels:
      gc: "$1"

  # JVM Runtime
  - pattern: 'java.lang<type=Runtime><>(\w+)'
    name: jvm_runtime_$1
    type: GAUGE
    help: "JVM runtime metrics"

  # Tomcat metrics (if deployed in Tomcat)
  - pattern: 'Catalina<type=GlobalRequestProcessor, name="(\w+)-(\w+)"><>(\w+)'
    name: tomcat_globalrequestprocessor_$3
    type: GAUGE
    labels:
      protocol: "$1"
      scheme: "$2"
  - pattern: 'Catalina<type=ThreadPool, name="(\w+)-(\w+)"><>(\w+)'
    name: tomcat_threadpool_$3
    type: GAUGE
    labels:
      protocol: "$1"
      scheme: "$2"

  # HikariCP connection pool
  - pattern: 'com.zaxxer.hikari<type=HikariDataSource, pool=(\w+)><>(\w+)'
    name: hikaricp_$2
    type: GAUGE
    labels:
      pool: "$1"
