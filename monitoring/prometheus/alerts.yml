# Alert rules for Headwind MDM
# Groups define alerting rules for different components

groups:
  - name: hmdm_application
    interval: 30s
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
          / sum(rate(http_server_requests_seconds_count[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on Headwind MDM"
          description: "Error rate is {{ $value | humanizePercentage }}. More than 5% of requests are failing."

      # High response time
      - alert: HighResponseTime
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_server_requests_seconds_bucket[5m])) by (le)
          ) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time on Headwind MDM"
          description: "95th percentile response time is {{ $value }} seconds."

      # JVM heap usage
      - alert: JVMHeapHighUsage
        expr: |
          jvm_memory_used_bytes{area="heap"}
          / jvm_memory_max_bytes{area="heap"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM heap usage is high"
          description: "Heap usage is {{ $value | humanizePercentage }}. Risk of OutOfMemoryError."

      # JVM heap critical
      - alert: JVMHeapCriticalUsage
        expr: |
          jvm_memory_used_bytes{area="heap"}
          / jvm_memory_max_bytes{area="heap"} > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "JVM heap usage is critical"
          description: "Heap usage is {{ $value | humanizePercentage }}. Immediate action required."

      # Database connection pool exhaustion
      - alert: DBConnectionPoolExhausted
        expr: |
          hikaricp_connections_active
          / hikaricp_connections_max > 0.9
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool near exhaustion"
          description: "Active connections: {{ $value | humanizePercentage }} of max."

  - name: postgresql_database
    interval: 30s
    rules:
      # PostgreSQL down
      - alert: PostgreSQLDown
        expr: up{job="postgresql"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL has been unreachable for 1 minute."

      # High connection count
      - alert: PostgreSQLHighConnections
        expr: |
          pg_stat_database_numbackends
          / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL high connection count"
          description: "Using {{ $value | humanizePercentage }} of max connections."

      # Database size warning
      - alert: PostgreSQLDatabaseLarge
        expr: |
          pg_database_size_bytes
          / 1073741824 > 100  # 100 GB
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL database is large"
          description: "Database size is {{ $value | humanize }}GB. Consider archiving old data."

      # Replication lag (if replica exists)
      - alert: PostgreSQLReplicationLag
        expr: |
          pg_replication_lag_seconds > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL replication lag"
          description: "Replica is {{ $value }} seconds behind primary."

  - name: system
    interval: 30s
    rules:
      # Node down
      - alert: NodeDown
        expr: up{job="node"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Node exporter is down"
          description: "Cannot collect system metrics."

      # High CPU usage
      - alert: HighCPUUsage
        expr: |
          100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}."

      # High memory usage
      - alert: HighMemoryUsage
        expr: |
          (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}."

      # Disk space low
      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space is low"
          description: "Only {{ $value }}% free on {{ $labels.instance }}."

      # Disk space critical
      - alert: DiskSpaceCritical
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Disk space is critical"
          description: "Only {{ $value }}% free on {{ $labels.instance }}. Immediate action required."

  - name: container
    interval: 30s
    rules:
      # Container down
      - alert: ContainerDown
        expr: |
          count(container_last_seen{name!=""}) by (name)
          == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} is down"
          description: "Container has stopped running."

      # High container CPU
      - alert: ContainerHighCPU
        expr: |
          rate(container_cpu_usage_seconds_total[5m]) * 100 > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} high CPU"
          description: "CPU usage is {{ $value }}%."
