# Grafana dashboard provisioning
apiVersion: 1

providers:
  - name: 'HMDM Dashboards'
    orgId: 1
    folder: 'Headwind MDM'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
