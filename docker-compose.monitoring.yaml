version: '3'

services:
  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:v2.42.0
    container_name: hmdm-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9091:9090"
    networks:
      - monitoring
    restart: unless-stopped

  # Alertmanager - Alert routing
  alertmanager:
    image: prom/alertmanager:v0.25.0
    container_name: hmdm-alertmanager
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./monitoring/alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    networks:
      - monitoring
    restart: unless-stopped

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:9.5.0
    container_name: hmdm-grafana
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    ports:
      - "3000:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

  # Node Exporter - System metrics
  node-exporter:
    image: prom/node-exporter:v1.5.0
    container_name: hmdm-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - monitoring
    restart: unless-stopped

  # cAdvisor - Container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: hmdm-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var-run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8082:8080"
    networks:
      - monitoring
    restart: unless-stopped

  # PostgreSQL database (using existing dev database)
  postgresql:
    image: docker.1ms.run/library/postgres:14-alpine
    container_name: hmdm-postgresql-standalone
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${SQL_USER}
      POSTGRES_PASSWORD: ${SQL_PASS}
      POSTGRES_DB: ${SQL_BASE}
    volumes:
      - ./monitoring/postgres-data:/var/lib/postgresql/data
    networks:
      - monitoring
    restart: unless-stopped

  # postgres-exporter - PostgreSQL metrics
  postgres-exporter:
    image: prom/postgres-exporter:v0.12.0
    container_name: hmdm-postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${SQL_USER}:${SQL_PASS}@postgresql:5432/${SQL_BASE}?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - postgresql

  # JMX Exporter for Java metrics - disabled due to corrupted image on mirror
  # hmdm-jmx-exporter:
  #   image: prom/jmx-exporter:v0.18.0
  #   container_name: hmdm-jmx-exporter
  #   volumes:
  #     - ./monitoring/jmx-exporter/jmx-config.yml:/opt/jmx-exporter/config.yml:ro
  #   ports:
  #     - "9404:9404"
  #   networks:
  #     - monitoring
  #   restart: unless-stopped

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  alertmanager-data:
  grafana-data:
